<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam 每日峰值在线人数</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #f0f2f5;
      color: #333;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .meta { font-size: 12px; color: #888; }

    /* ── Layout ── */
    .container { max-width: 1440px; margin: 0 auto; padding: 20px 32px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-start;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-label { font-size: 13px; color: #666; font-weight: 500; white-space: nowrap; }

    .btn-group { display: flex; gap: 4px; }
    .btn {
      padding: 4px 12px;
      border: 1px solid #d9d9d9;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      transition: all 0.15s;
    }
    .btn:hover { border-color: #5470c6; color: #5470c6; }
    .btn.active { background: #5470c6; color: #fff; border-color: #5470c6; }
    .btn.sm { padding: 3px 10px; font-size: 12px; }

    .game-checks { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 2px; }
    .game-check {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
    }
    .game-check input { cursor: pointer; accent-color: #5470c6; width: 14px; height: 14px; }
    .color-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Chart ── */
    #chart { width: 100%; height: 460px; }

    /* ── Table ── */
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .table-title { font-size: 13px; font-weight: 600; color: #555; }
    .table-scroll { overflow-x: auto; max-height: 520px; overflow-y: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      position: sticky;
      top: 0;
      background: #fafafa;
      padding: 9px 14px;
      text-align: right;
      font-weight: 600;
      border-bottom: 2px solid #e8e8e8;
      white-space: nowrap;
      z-index: 2;
      color: #444;
    }
    thead th:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 3;
      background: #fafafa;
    }
    tbody td {
      padding: 7px 14px;
      text-align: right;
      border-bottom: 1px solid #f5f5f5;
      white-space: nowrap;
    }
    tbody td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: #fff;
      font-weight: 500;
      z-index: 1;
      color: #555;
    }
    tbody tr:hover td { background: #f7f9ff; }
    tbody tr:hover td:first-child { background: #f7f9ff; }
    .null-val { color: #d0d0d0; }

    /* ── Loading / Error ── */
    .loading { text-align: center; padding: 80px; color: #999; font-size: 15px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <h1>Steam 每日峰值在线人数</h1>
  <span class="meta" id="meta">加载中...</span>
</div>

<div class="container">

  <!-- Filters -->
  <div class="card hidden" id="filter-card">
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">时间范围：</span>
        <div class="btn-group" id="range-btns">
          <button class="btn" data-range="1M">1个月</button>
          <button class="btn" data-range="3M">3个月</button>
          <button class="btn active" data-range="6M">6个月</button>
          <button class="btn" data-range="1Y">1年</button>
          <button class="btn" data-range="ALL">全部</button>
        </div>
      </div>
      <div class="filter-group" style="align-items:flex-start">
        <span class="filter-label" style="margin-top:3px">游戏：</span>
        <div>
          <button class="btn sm" id="btn-select-all" style="margin-bottom:8px">全选/取消</button>
          <div class="game-checks" id="game-checks"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card hidden" id="chart-card">
    <div id="chart"></div>
  </div>

  <!-- Table -->
  <div class="card hidden" id="table-card">
    <div class="table-header">
      <span class="table-title" id="table-title"></span>
    </div>
    <div class="table-scroll">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div class="loading" id="loading">加载中...</div>

</div>

<script>
  // ── ECharts 颜色（与游戏顺序对应）
  const COLORS = [
    '#5470c6','#91cc75','#fac858','#ee6666',
    '#73c0de','#3ba272','#fc8452','#9a60b4','#ea7ccc','#4ecdc4'
  ];

  let G = null;          // games.json 数据
  let chart = null;
  let selectedRange = '6M';
  let selectedGames = new Set();

  // ── 格式化数字
  function fmtNum(n) {
    if (n == null) return '<span class="null-val">—</span>';
    return n.toLocaleString('en-US');
  }

  // ── 获取时间范围起始日期
  function getStartDate() {
    const lastDate = new Date(G.dates[G.dates.length - 1] + 'T00:00:00');
    if (selectedRange === 'ALL') return new Date(G.dates[0] + 'T00:00:00');
    const d = new Date(lastDate);
    if      (selectedRange === '1M') d.setMonth(d.getMonth() - 1);
    else if (selectedRange === '3M') d.setMonth(d.getMonth() - 3);
    else if (selectedRange === '6M') d.setMonth(d.getMonth() - 6);
    else if (selectedRange === '1Y') d.setFullYear(d.getFullYear() - 1);
    return d;
  }

  // ── 获取在时间范围内的索引（升序）
  function getIndices() {
    const start = getStartDate();
    const result = [];
    for (let i = 0; i < G.dates.length; i++) {
      if (new Date(G.dates[i] + 'T00:00:00') >= start) result.push(i);
    }
    return result;
  }

  // ── 渲染折线图
  function renderChart() {
    if (!chart) chart = echarts.init(document.getElementById('chart'));

    const indices = getIndices();
    const dates = indices.map(i => G.dates[i]);
    const activeGames = G.games.filter(g => selectedGames.has(g));

    const series = activeGames.map(name => {
      const colorIdx = G.games.indexOf(name);
      // 仅保留有值的点，避免 null 被连线
      const seriesData = indices.map(i => {
        const v = G.data[name][i];
        return v != null ? v : null;
      });
      return {
        name,
        type: 'line',
        symbol: 'none',
        lineStyle: { width: 1.8 },
        color: COLORS[colorIdx % COLORS.length],
        data: seriesData,
        connectNulls: false,
      };
    });

    chart.setOption({
      animation: false,
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'cross', crossStyle: { color: '#999' } },
        formatter(params) {
          const date = params[0]?.axisValue || '';
          let html = `<div style="font-size:13px;font-weight:600;margin-bottom:6px">${date}</div>`;
          const sorted = [...params]
            .filter(p => p.value != null)
            .sort((a, b) => b.value - a.value);
          sorted.forEach(p => {
            html += `<div style="margin:3px 0;display:flex;justify-content:space-between;gap:20px">
              <span>${p.marker}${p.seriesName}</span>
              <b>${p.value.toLocaleString('en-US')}</b>
            </div>`;
          });
          return html;
        },
      },
      legend: {
        data: activeGames,
        bottom: 4,
        type: 'scroll',
        textStyle: { fontSize: 12 },
      },
      grid: { top: 20, right: 24, bottom: 48, left: 72 },
      xAxis: {
        type: 'category',
        data: dates,
        boundaryGap: false,
        axisLabel: {
          formatter(val) {
            // 只显示 YYYY-MM，ECharts 自动控制密度
            return val.slice(0, 7);
          },
        },
      },
      yAxis: {
        type: 'value',
        axisLabel: {
          formatter(v) {
            if (v >= 1000000) return (v / 10000).toFixed(0) + '万';
            if (v >= 10000)   return (v / 10000).toFixed(1) + '万';
            return v.toString();
          },
        },
        splitLine: { lineStyle: { color: '#f0f0f0' } },
      },
      series,
    }, /* notMerge */ true);
  }

  // ── 渲染表格
  function renderTable() {
    const activeGames = G.games.filter(g => selectedGames.has(g));
    const indices = getIndices().reverse(); // 最新日期在上

    // 表头
    document.getElementById('table-head').innerHTML =
      '<tr><th>日期</th>' +
      activeGames.map(g => `<th>${g}</th>`).join('') +
      '</tr>';

    // 表体
    const rows = indices.map(i => {
      const cells = activeGames
        .map(g => `<td>${fmtNum(G.data[g][i])}</td>`)
        .join('');
      return `<tr><td>${G.dates[i]}</td>${cells}</tr>`;
    });
    document.getElementById('table-body').innerHTML = rows.join('');
    document.getElementById('table-title').textContent =
      `数据明细（${indices.length} 天）`;
  }

  // ── 构建游戏复选框
  function buildGameChecks() {
    const container = document.getElementById('game-checks');
    container.innerHTML = G.games.map((name, i) => `
      <label class="game-check">
        <input type="checkbox" value="${name}" checked />
        <span class="color-dot" style="background:${COLORS[i % COLORS.length]}"></span>
        ${name}
      </label>
    `).join('');

    container.querySelectorAll('input').forEach(cb => {
      cb.addEventListener('change', () => {
        if (cb.checked) selectedGames.add(cb.value);
        else            selectedGames.delete(cb.value);
        renderChart();
        renderTable();
      });
    });
  }

  // ── 初始化
  async function init() {
    try {
      const resp = await fetch('games.json');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      G = await resp.json();

      G.games.forEach(g => selectedGames.add(g));

      document.getElementById('meta').textContent =
        `最后更新：${G.last_updated}　·　${G.games.length} 款游戏　·　${G.dates.length} 天数据`;

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('filter-card').classList.remove('hidden');
      document.getElementById('chart-card').classList.remove('hidden');
      document.getElementById('table-card').classList.remove('hidden');

      buildGameChecks();
      renderChart();
      renderTable();

      // 时间范围按钮
      document.getElementById('range-btns').querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#range-btns .btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedRange = btn.dataset.range;
          renderChart();
          renderTable();
        });
      });

      // 全选 / 取消
      document.getElementById('btn-select-all').addEventListener('click', () => {
        const checks = document.querySelectorAll('#game-checks input');
        const allChecked = [...checks].every(c => c.checked);
        checks.forEach(c => {
          c.checked = !allChecked;
          if (c.checked) selectedGames.add(c.value);
          else           selectedGames.delete(c.value);
        });
        renderChart();
        renderTable();
      });

      // 窗口缩放
      window.addEventListener('resize', () => chart && chart.resize());

    } catch (e) {
      document.getElementById('loading').textContent = '加载失败：' + e.message;
    }
  }

  init();
</script>
</body>
</html>
